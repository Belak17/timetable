<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Professor Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style-professor/style-professor-app.css}">
    <link rel="stylesheet"
          href="https://cdn-uicons.flaticon.com/uicons-solid-straight/css/uicons-solid-straight.css">
</head>
<body>
<input type="checkbox" id="toggle-sidebar" />
<header>
    <div class="head-box">
        <!-- Checkbox caché -->

        <label for="toggle-sidebar">
            <div  id="menu">

                <img th:src="@{/images/menu-burger.png}">


            </div>
        </label>
        <h2 th:text="'Bienvenue cher Professeur ' + ${fullname}"></h2>
    </div>
</header>
<section class="icons">
    <div>
        <h2>
            Menu
        </h2>
    </div>

    <div class="icons-option">
        <div class="icon-container">
            <a th:href="@{/professor/dashboard}">
                <img th:src="@{/images/home.png}" width="20">

                <span class="tooltip">Dashboard</span>
            </a>
        </div>
        <div class="icon-container">
            <a th:href="@{/professor/profile}">
                <img th:src="@{/images/user (1).png}" width="20">

                <span class="tooltip">Profil</span>
            </a>
        </div>
        <div class="icon-container">
            <a th:href="@{/professor/timetable}">
                <img th:src="@{/images/calendar-clock (1).png}" width="20">


                <span class="tooltip">Emploi du temps </span>
            </a>
        </div>
        <div class="icon-container">

            <label for="toggle-sidebar" class="close-btn">
                <img th:src="@{/images/grid.png}" width="20">

                <span class="tooltip">Espace </span>
            </label>
        </div>
        <div class="icon-container">

            <label for="toggle-sidebar" class="close-btn">
                <img th:src="@{/images/cross-small.png}" width="20">

                <span class="tooltip">Fermer </span>
            </label>
        </div>
    </div>
</section>
</body>
</html>
